# ⚠️ ACTION VERSIONS ARE BEST-GUESS, NOT CONFIRMED. Web sources were contradictory
# (e.g. actions/checkout shows as v4/v5/v7 across sources; withastro/action and
# actions/deploy-pages could not be pinned with confidence). On the FIRST run, if a
# step fails with "Unable to resolve action <action>@<tag>", read the tag from the
# error, check that action's available release tags on GitHub, and pin a valid one.
# See quickstart.md → Deploy → "First deploy (verify action versions)".
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege + the tokens GitHub Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; never cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Quality gate: lint, unit/component tests, the production-preview e2e suite, and
  # the dev-mode island-hydration e2e (drives `astro dev` — a failure the preview
  # never sees). Runs on every push/PR and gates the build/deploy below.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7 # ⚠️ version unverified — adjust on first run if it fails to resolve

      - name: Set up Node
        uses: actions/setup-node@v4 # ⚠️ version unverified — adjust on first run if it fails to resolve
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Lint (astro check + eslint + prettier)
        run: npm run lint

      - name: Unit + component tests (Vitest)
        run: npm test

      - name: Preview e2e (build + Playwright over the static site)
        run: npm run test:e2e

      - name: Dev-mode e2e (island hydration under `astro dev`)
        run: npm run test:e2e:dev

  build:
    needs: test
    # Only build/deploy off pushes to main (and manual dispatch) — never on PRs.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7 # ⚠️ version unverified — adjust on first run if it fails to resolve

      # Constitution VI gate — fail fast (no deps needed) before the build.
      - name: Guard — no browser storage in source (Constitution VI)
        run: node scripts/check-no-storage.mjs

      # Installs deterministically (npm ci, from the committed package-lock.json),
      # runs the build, and uploads the Pages artifact. build-cmd = `npm run build`
      # so the prebuild image gate (FR-014) runs in CI too; the build script sets
      # SKIP_KEYSTATIC=true → pure static output, no /keystatic route (FR-023).
      - name: Build static site
        uses: withastro/action@v6 # ⚠️ version unverified — adjust on first run if it fails to resolve
        with:
          build-cmd: npm run build
        env:
          SKIP_KEYSTATIC: 'true'

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5 # ⚠️ version unverified — adjust on first run if it fails to resolve
