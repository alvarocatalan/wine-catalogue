<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 74 182" role="img" aria-label="Imagen de botella no disponible">
  <!-- Placeholder bottle matching the design handoff: warm neutral striped
       silhouette on a transparent background (the card/detail panel gradient
       shows through), replacing the previous grey outline. -->
  <defs>
    <pattern id="neck" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="10" height="5" fill="#d8d3c8" />
      <rect y="5" width="10" height="5" fill="#e2ded4" />
    </pattern>
    <pattern id="body" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect width="12" height="6" fill="#d5d0c4" />
      <rect y="6" width="12" height="6" fill="#e0dbcf" />
    </pattern>
  </defs>
  <rect x="29" y="8" width="16" height="40" rx="5" fill="url(#neck)" />
  <rect x="10" y="44" width="54" height="130" rx="9" fill="url(#body)" />
</svg>
